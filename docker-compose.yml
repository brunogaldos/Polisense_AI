services:

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.37.2
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    ports:
      # host:container — host 8090 matches the store CLIs' default WEAVIATE_PORT
      - "8090:8080"
      - "50051:50051"
    restart: on-failure:0
    volumes:
      - weaviate_data:/var/lib/weaviate
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      CLUSTERING_ENABLE_CLUSTERING: "false"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5029:5029"
    environment:
      # Local RAG stack reaches Weaviate over the compose network. Harmless
      # until a later milestone wires the store into the request path.
      WEAVIATE_HOST: weaviate
      WEAVIATE_PORT: "8080"
    depends_on:
      - weaviate
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Server-side: Next.js API proxy → backend container (Docker DNS)
        RESEARCH_API_URL: http://backend:5029
        # Browser-side WebSocket: connects directly from the browser to the exposed port
        NEXT_PUBLIC_RESEARCH_WS_URL: ws://localhost:5029/ws
        # NEXT_PUBLIC_RESEARCH_API_URL is intentionally NOT set here.
        # It defaults to /api inside the app, which routes through the Next.js proxy
        # above — keeping all HTTP traffic inside the Docker network.
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  weaviate_data:
